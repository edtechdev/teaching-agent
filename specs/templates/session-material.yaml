template:
  id: session-material
  name: 'Session Material'
  version: 1.0
  output:
    format: markdown
    filename: materials/{{number}}-{{type}}.md
  title: 'Session {{number}} ({{type | title}})'
  sections:
    - id: outline
      title: Planned Outline
      template: > # {{title}}

        Summary

        ## Introduction
        Content
        References

        ## Main Part 1
        Content
        References

        ## Main Part 2
        Content
        References

        ## Summary / Wrap-up
        Content
        References
